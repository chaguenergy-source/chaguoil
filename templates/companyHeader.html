<header class="document-header"id="CompanyTitle" hidden>
    <div class="header-main-title">{{useri.company.jina}}</div>
    
    <div class="header-details">
        <div class="contact-info">
            <p><strong>Phone:</strong> {{useri.company.phone}} {%if useri.company.phone2%},{{useri.company.phone2}}{% endif %}</p>
            <p><strong>Email:</strong> {{useri.company.email}}</p>
        </div>

        <div class="logo-container">
            <img src="{% if useri.company.logo %}{{useri.company.logo.url}}{% endif %}" alt="Logo">
            
        </div>

        <div class="address-info">
            <p>{{useri.company.address}},</p>
            <p>{{useri.company.country}}</p>
        </div>
    </div>
    <div class="blue-line mb-4"></div>
</header>
