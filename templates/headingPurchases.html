        {% endif %}
        {% if qty != rcvd  and not trf.closed %}

        {% endif %}

        </a>

            <a type="button" href="/salepurchase/viewPurchase?t=1&i={{trf.id}}&lang={{useri.langSet}}" target="_blank" class="btn fontColor btn-light btn-sm smallFont" title="{% if useri.langSet == 0 %}Print Notisi{% else %}Print Note{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-printer" viewBox="0 0 16 16">

                <div class="dropdown-menu">
                    <a class="dropdown-item fontColor" href="/salepurchase/viewPurchase?t=1&i={{trf.id}}&lang=0" target="_blank">Swahili</a>
                    <a class="dropdown-item fontColor" href="/salepurchase/viewPurchase?t=1&i={{trf.id}}&lang=1" target="_blank">English</a>
                </div>
            </div>
        </div>
        {% endif %}
        {% endif %}

        {% endif %}

   

    <a class="border-left pl-1 {% if isVendor %} activetab {% endif %}" href="/salepurchase/vendors"  title="{% if useri.langSet == 0 %}Wasambazaji{% else %}Vendors{% endif %}"  >

    </a>

            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
            <circle cx="5.5" cy="18.5" r="2.5"></circle>
            <circle cx="18.5" cy="18.5" r="2.5"></circle>

    </a>
